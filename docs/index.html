<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800">
  <title>Roy Cloud Menu — Sunday, March 15, 2026</title>
  <style>
    /* TRMNL target: 800x480px, e-ink (black & white) */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 800px;
      height: 480px;
      overflow: hidden;
      font-family: 'Georgia', serif;
      background: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
      padding: 16px 20px 12px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 2px solid #000;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    header h1 { font-size: 22px; font-weight: bold; letter-spacing: 0.5px; }
    header .date { font-size: 13px; color: #333; }
    .menus {
      display: flex;
      gap: 20px;
      flex: 1;
      overflow: hidden;
    }
    .menu-section {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 12px;
      overflow: hidden;
    }
    .menu-section h2 {
      font-size: 15px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
      margin-bottom: 8px;
    }
    .cat-row {
      margin-bottom: 6px;
      font-size: 12px;
      line-height: 1.4;
    }
    .cat-name {
      display: block;
      font-weight: bold;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #555;
    }
    .cat-items {
      display: block;
      font-size: 13px;
    }
    .no-menu, .no-school {
      font-size: 14px;
      color: #666;
      font-style: italic;
      padding-top: 8px;
    }
    footer {
      font-size: 10px;
      color: #999;
      text-align: right;
      padding-top: 6px;
      border-top: 1px solid #eee;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏫 Roy Cloud School Menu</h1>
    <span class="date">Sunday, March 15, 2026</span>
  </header>
  <div class="menus">
    
      <section class="menu-section">
        <h2>🍳 Breakfast</h2>
        <p class="no-menu">No menu posted</p>
      </section>
    
      <section class="menu-section">
        <h2>🍽️ Lunch</h2>
        <p class="no-menu">No menu posted</p>
      </section>
  </div>
  <footer>Updated 6:47 PM PT · menus.healthepro.com</footer>
</body>
</html>
