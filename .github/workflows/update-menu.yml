name: Update School Menu

on:
  schedule:
    # Run at 6 AM, 11 AM, and 2 PM PT on weekdays
    # UTC offsets: PDT=UTC-7, PST=UTC-8; times below target PDT (summer) hours
    - cron: '0 13 * * 1-5'   # 6 AM PDT / 5 AM PST
    - cron: '0 18 * * 1-5'   # 11 AM PDT / 10 AM PST
    - cron: '0 21 * * 1-5'   # 2 PM PDT / 1 PM PST — flips to tomorrow's menu for pickup time
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate menu page
        run: node generate.js

      - name: Commit and push updated page
        run: |
          git config user.name "jarvis-jonsbot"
          git config user.email "jarvis.jonsbot@icloud.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update menu for $(date -u '+%Y-%m-%d')"
          git push
